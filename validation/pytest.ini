[pytest]
# Scoped pytest configuration for the EchoBase validation suite ONLY.
# The existing tests/ suite deliberately runs on pytest defaults and is never
# touched by this file (run it with `just test`, run this with
# `pytest validation/`). Using importlib import mode avoids same-basename test
# collisions and sys.path surprises between the logic/ and realmodel/ subpackages.
addopts = -ra --import-mode=importlib
markers =
    real_model: requires real faster-whisper models + audio (set ECHOBASE_VALIDATION_REAL=1 to run)
    manual: companion check for a human-run protocol; skipped in automated runs
    slow: long-running (e.g. 1000-command stress); deselect with -m "not slow"
